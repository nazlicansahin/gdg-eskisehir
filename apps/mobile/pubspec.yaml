name: gdg_events
description: GDG Eskişehir Phase 1 mobile app (events, registration, ticket).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  equatable: ^2.0.7
  firebase_auth: ^5.3.4
  firebase_core: ^3.8.1
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  fpdart: ^1.1.0
  go_router: ^14.6.2
  gql: ^1.0.1
  graphql: ^5.1.3
  intl: ^0.20.2
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1
  mobile_scanner: ^7.0.0
  qr_flutter: ^4.1.0
  url_launcher: ^6.3.1
  add_2_calendar: ^3.0.1
  shared_preferences: ^2.5.5
  timezone: ^0.10.1
  flutter_timezone: ^5.0.2
  flutter_jailbreak_detection: ^1.10.0
  device_info_plus: ^13.1.0

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  generate: true
  uses-material-design: true
