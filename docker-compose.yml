services:
  postgres:
    image: postgres:16-alpine
    container_name: gdg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gdg_events
      POSTGRES_USER: gdg
      POSTGRES_PASSWORD: gdg
    ports:
      - "5432:5432"
    volumes:
      - gdg_postgres_data:/var/lib/postgresql/data
      - ./backend/internal/infrastructure/postgres/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gdg -d gdg_events"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gdg-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./.env.local
    environment:
      HTTP_ADDR: ":8080"
      BACKEND_DB_DSN: "postgres://gdg:gdg@postgres:5432/gdg_events?sslmode=disable"
    ports:
      - "8081:8080"

volumes:
  gdg_postgres_data:
